<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasySearch</title>
  <link rel="stylesheet" href="easySearch.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<body>

  <header>
    <div class="left-header">
      <img src="images/c17effa7-3a6f-4ea9-b04c-34275868a144.png" alt="EasySearch logo" class="logo">

    <nav>
      <a href="#">Home</a>
      <a href="#">Job</a>
      <a href="#">About</a>
      <a href="#">Help</a>
      <a href="#" class="login">Login</a>
      <a href="#" class="register">Register</a>
    </nav>
  </header>

  <main>
    <section class="hero">

  <h1>Swipe For Your Next Career</h1>
  <p>Explore millions of job opportunities.</p>

  <div class="search-wrapper">
    <div class="search-item">
      <i class="fa fa-search"></i>
      <input type="text" placeholder="Job title, keywords, or company">
    </div>

    <div class="divider"></div>

    <div class="search-item">
      <i class="fa fa-map-marker-alt"></i>
      <input type="text" placeholder="Location">
    </div>

    <button class="search-btn">Find jobs</button>
  </div>

</section>

   
    <section class="logo-slider">
      <div class="logos">
        <img src="images/amazon.png" alt="Amazon">
        <img src="images/apple.png" alt="Apple">
        <img src="images/belairdirect.png" alt="Belair Direct">
        <img src="images/cityoftoronto.png" alt="City of Toronto">
        <img src="images/google.webp" alt="Google">
        <img src="images/homedepot.png" alt="Home Depot">
        <img src="images/metro.png" alt="Metro">
        <img src="images/microsoft.png" alt="Microsoft">
        <img src="images/Samsung.png" alt="Samsung">
        <img src="images/shopify.png" alt="Shopify">
        <img src="images/Uhaul.webp" alt="U-Haul">

        <img src="images/amazon.png" alt="Amazon">
        <img src="images/apple.png" alt="Apple">
        <img src="images/belairdirect.png" alt="Belair Direct">
        <img src="images/cityoftoronto.png" alt="City of Toronto">
        <img src="images/google.webp" alt="Google">
        <img src="images/homedepot.png" alt="Home Depot">
        <img src="images/metro.png" alt="Metro">
        <img src="images/microsoft.png" alt="Microsoft">
        <img src="images/Samsung.png" alt="Samsung">
        <img src="images/shopify.png" alt="Shopify">
        <img src="images/Uhaul.webp" alt="U-Haul">
      </div>
    </section>
  </main>

  <footer>
    
    <div>&copy; 2026 EasySearch</div>

    <div class="social">
      <a href="#"><i class="fa-brands fa-linkedin"></i></a>
      <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </footer>

</body>
</html>
